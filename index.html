<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassTimr - Advanced Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        .font-digital {
            font-family: 'Share Tech Mono', monospace;
            font-variant-numeric: tabular-nums;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #a855f7;
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4b5563;
            border-radius: 2px;
        }

        .timer-box {
            transition: all 0.3s ease;
        }
        .timer-box:hover {
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes timer-zero-pulse {
            0%, 100% { transform: scale(1); color: #f87171; text-shadow: 0 0 20px rgba(248, 113, 113, 0.5); }
            50% { transform: scale(1.08); color: #ef4444; text-shadow: 0 0 80px rgba(239, 68, 68, 1); }
        }
        .timer-zero {
            animation: timer-zero-pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-white select-none">

    <canvas id="bg-canvas" class="fixed inset-0 w-full h-full z-0"></canvas>

    <div class="relative z-10 flex flex-col items-center justify-center min-h-screen pb-20">
        <div class="timer-box rounded-[3rem] px-16 py-12 flex flex-col items-center justify-center cursor-pointer" onclick="togglePlayPause()">
            <div id="time-display" class="font-digital text-[12rem] md:text-[20rem] leading-none font-bold tracking-tighter drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                15:00
            </div>
        </div>
    </div>

    <div id="control-bar" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[95%] max-w-7xl glass-panel rounded-2xl p-4 flex flex-col md:flex-row items-center justify-between z-20 transition-opacity duration-700 shadow-2xl space-y-4 md:space-y-0">
        
        <div class="flex items-center space-x-4 md:w-1/4">
            <button id="btn-play" onclick="togglePlayPause()" class="w-14 h-14 bg-purple-600 hover:bg-purple-500 rounded-full flex items-center justify-center transition-transform transform hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(147,51,234,0.5)] text-white">
                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button onclick="resetTimer()" class="w-12 h-12 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center transition text-gray-300 hover:text-white" title="Reset Timer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </div>

        <div class="flex flex-col items-center md:w-2/4 space-y-2">
            <div class="flex bg-gray-800/80 border border-gray-600 rounded-lg p-0.5">
                <button id="btn-mode-timer" onclick="switchMode('timer')" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-purple-600 text-white">Timer</button>
                <button id="btn-mode-stopwatch" onclick="switchMode('stopwatch')" class="px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-400 hover:text-white">Stopwatch</button>
            </div>
            <div id="quick-start-section" class="flex flex-col items-center">
                <span class="text-xs text-gray-400 font-semibold uppercase tracking-wider mb-2">Quick Start</span>
                <div class="flex space-x-2">
                    <button onclick="setPreset(1)" class="px-4 py-2 bg-gray-800/80 hover:bg-purple-600 border border-gray-600 hover:border-purple-400 rounded-lg text-sm font-medium transition">1 Min</button>
                    <button onclick="setPreset(5)" class="px-4 py-2 bg-gray-800/80 hover:bg-purple-600 border border-gray-600 hover:border-purple-400 rounded-lg text-sm font-medium transition">5 Min</button>
                    <button onclick="setPreset(10)" class="px-4 py-2 bg-gray-800/80 hover:bg-purple-600 border border-gray-600 hover:border-purple-400 rounded-lg text-sm font-medium transition">10 Min</button>
                    <button onclick="setPreset(15)" class="px-4 py-2 bg-gray-800/80 hover:bg-purple-600 border border-gray-600 hover:border-purple-400 rounded-lg text-sm font-medium transition">15 Min</button>
                    <button onclick="showCustomTimeModal()" class="px-4 py-2 bg-gray-800/80 hover:bg-purple-600 border border-gray-600 hover:border-purple-400 rounded-lg text-sm font-medium transition">Custom</button>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end space-x-4 md:w-1/4 text-sm">
            <div class="flex flex-col space-y-1">
                <select id="music-select" onchange="changeMusic()" class="bg-gray-800/50 text-gray-200 border border-gray-600 rounded-md px-2 py-1 outline-none focus:border-purple-500 cursor-pointer">
                    <option value="none">🔇 None</option>
                    <option value="library">🎵 Music Library</option>
                </select>
                <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="changeVolume()" class="w-full mt-1" title="Volume">
            </div>

            <select id="theme-select" onchange="changeTheme()" class="bg-gray-800/50 text-gray-200 border border-gray-600 rounded-md px-3 py-2 outline-none focus:border-purple-500 cursor-pointer">
                <option value="space">🌌 Space Explorer</option>
                <option value="ocean">🌊 Deep Ocean</option>
                <option value="cyber">🟩 Cyber Matrix</option>
                <option value="biolum">🪼 Glowing Tide</option>
                <option value="kelp">🌊 Kelp Forest</option>
                <option value="dna">🧬 Double Helix</option>
                <option value="koi">💮 Tranquil Koi</option>
                <option value="magnetic">🧲 Magnetic Flux</option>
                <option value="neural">🕸️ Neural Network</option>
                <option value="hadron">⚡ Hadron Collider</option>
                <option value="quantum">⚛️ Quantum Realm</option>
            </select>

            <button onclick="toggleFullScreen()" class="p-2 text-gray-400 hover:text-white transition" title="Fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
            </button>
        </div>
    </div>

    <div id="custom-time-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-3xl shadow-2xl flex flex-col items-center transform scale-95 transition-transform duration-300" id="custom-time-box">
            <h3 class="text-xl text-white font-semibold mb-6 tracking-wide">Set Custom Time</h3>
            <div class="flex items-center space-x-4 text-4xl font-digital text-white mb-2">
                <input type="number" id="custom-min" min="0" max="999" class="w-24 bg-gray-800 border border-gray-600 rounded-xl p-3 text-center focus:outline-none focus:border-purple-500" placeholder="MM" value="20">
                <span class="pb-2">:</span>
                <input type="number" id="custom-sec" min="0" max="59" class="w-24 bg-gray-800 border border-gray-600 rounded-xl p-3 text-center focus:outline-none focus:border-purple-500" placeholder="SS" value="00">
            </div>
            <div class="flex space-x-4 mt-8 w-full">
                <button onclick="closeCustomTimeModal()" class="flex-1 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-300 transition font-medium">Cancel</button>
                <button onclick="applyCustomTime()" class="flex-1 py-3 rounded-xl bg-purple-600 hover:bg-purple-500 text-white font-semibold shadow-[0_0_15px_rgba(147,51,234,0.3)] transition">Set Time</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. TIMER LOGIC ---
        let timeRemaining = 15 * 60;
        let initialTime = timeRemaining;
        let timerInterval = null;
        let isRunning = false;
        let isStopwatchMode = false;
        let elapsedTime = 0;

        const timeDisplay = document.getElementById('time-display');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const btnPlay = document.getElementById('btn-play');

        function updateDisplay() {
            let t = isStopwatchMode ? elapsedTime : timeRemaining;
            let minutes = Math.floor(t / 60);
            let seconds = t % 60;
            let formattedTime = minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
            timeDisplay.textContent = formattedTime;
            document.title = `${formattedTime} - ClassTimr`;

            if (!isStopwatchMode) {
                if (timeRemaining <= 10 && timeRemaining > 0) {
                    timeDisplay.classList.add('text-red-400');
                } else {
                    timeDisplay.classList.remove('text-red-400');
                }
                if (timeRemaining > 0) {
                    timeDisplay.classList.remove('timer-zero');
                }
            }
        }

        function togglePlayPause() {
            if (!isStopwatchMode && timeRemaining <= 0) {
                timeRemaining = initialTime;
                updateDisplay();
                timeDisplay.classList.remove('timer-zero');
                document.body.style.backgroundColor = '#000';
                return;
            }

            if (isRunning) {
                clearInterval(timerInterval);
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
                btnPlay.classList.remove('bg-red-500', 'hover:bg-red-400');
                btnPlay.classList.add('bg-purple-600', 'hover:bg-purple-500');
                if (typeof bgAudio !== 'undefined') bgAudio.pause();
            } else {
                if (typeof musicSelect !== 'undefined' && musicSelect.value !== 'none') {
                    playCurrentTrack();
                }

                if (isStopwatchMode) {
                    timerInterval = setInterval(() => {
                        elapsedTime++;
                        updateDisplay();
                    }, 1000);
                } else {
                    timerInterval = setInterval(() => {
                        if (timeRemaining > 0) {
                            timeRemaining--;
                            updateDisplay();
                        } else {
                            clearInterval(timerInterval);
                            isRunning = false;
                            iconPlay.classList.remove('hidden');
                            iconPause.classList.add('hidden');
                            btnPlay.classList.remove('bg-red-500', 'hover:bg-red-400');
                            btnPlay.classList.add('bg-purple-600', 'hover:bg-purple-500');
                            if (typeof bgAudio !== 'undefined') bgAudio.pause();
                            timeDisplay.classList.add('timer-zero');
                            document.body.style.backgroundColor = "rgba(239, 68, 68, 0.3)";
                            setTimeout(() => document.body.style.backgroundColor = "#000", 400);
                        }
                    }, 1000);
                }
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
                btnPlay.classList.remove('bg-purple-600', 'hover:bg-purple-500');
                btnPlay.classList.add('bg-red-500', 'hover:bg-red-400');
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            if (isStopwatchMode) {
                elapsedTime = 0;
            } else {
                timeRemaining = initialTime;
            }
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            btnPlay.classList.remove('bg-red-500', 'hover:bg-red-400');
            btnPlay.classList.add('bg-purple-600', 'hover:bg-purple-500');
            if (typeof bgAudio !== 'undefined') bgAudio.pause();
            timeDisplay.classList.remove('timer-zero');
            timeDisplay.classList.remove('text-red-400');
            document.body.style.backgroundColor = "#000";
            updateDisplay();
        }

        function switchMode(mode) {
            const newIsStopwatch = (mode === 'stopwatch');
            if (newIsStopwatch === isStopwatchMode) return;
            isStopwatchMode = newIsStopwatch;
            resetTimer();
            const btnTimer = document.getElementById('btn-mode-timer');
            const btnStopwatch = document.getElementById('btn-mode-stopwatch');
            const quickStart = document.getElementById('quick-start-section');
            if (isStopwatchMode) {
                btnStopwatch.classList.add('bg-purple-600', 'text-white');
                btnStopwatch.classList.remove('text-gray-400', 'hover:text-white');
                btnTimer.classList.remove('bg-purple-600', 'text-white');
                btnTimer.classList.add('text-gray-400', 'hover:text-white');
                quickStart.classList.add('hidden');
            } else {
                btnTimer.classList.add('bg-purple-600', 'text-white');
                btnTimer.classList.remove('text-gray-400', 'hover:text-white');
                btnStopwatch.classList.remove('bg-purple-600', 'text-white');
                btnStopwatch.classList.add('text-gray-400', 'hover:text-white');
                quickStart.classList.remove('hidden');
            }
        }

        function setPreset(minutes) {
            initialTime = minutes * 60;
            timeRemaining = initialTime;
            updateDisplay();
            if (!isRunning) {
                togglePlayPause();
            }
        }

        // --- CUSTOM TIME MODAL LOGIC ---
        const customModal = document.getElementById('custom-time-modal');
        const customBox = document.getElementById('custom-time-box');
        
        function showCustomTimeModal() {
            customModal.classList.remove('hidden');
            void customModal.offsetWidth;
            customModal.classList.remove('opacity-0');
            customBox.classList.remove('scale-95');
            customBox.classList.add('scale-100');
            document.getElementById('custom-min').focus();
        }

        function closeCustomTimeModal() {
            customModal.classList.add('opacity-0');
            customBox.classList.remove('scale-100');
            customBox.classList.add('scale-95');
            setTimeout(() => { customModal.classList.add('hidden'); }, 300);
        }

        function applyCustomTime() {
            let min = parseInt(document.getElementById('custom-min').value);
            let sec = parseInt(document.getElementById('custom-sec').value);
            if (isNaN(min) || min < 0) min = 0;
            if (isNaN(sec) || sec < 0) sec = 0;
            initialTime = (min * 60) + sec;
            if (initialTime === 0) return;
            timeRemaining = initialTime;
            updateDisplay();
            closeCustomTimeModal();
            if (!isRunning) {
                togglePlayPause();
            }
        }

        updateDisplay();

        // --- 1.5 AUDIO & MUSIC LOGIC ---
        const bgAudio = new Audio();
        bgAudio.loop = false;

        const PLAYLIST = [
            'audio/lofi-background.mp3',
            'audio/lofi-deep-focus.mp3',
            'audio/lofi-girl.mp3',
            'audio/lchill-night.mp3',
            'audio/llofi-jazz.mp3',
            'audio/library-lofi.mp3',
            'audio/library-coffee.mp3'
        ];
        let currentTrackIndex = 0;

        const musicSelect = document.getElementById('music-select');
        const volumeSlider = document.getElementById('volume-slider');

        function playNextTrack() {
            if (musicSelect.value !== 'library' || PLAYLIST.length === 0) return;
            currentTrackIndex = (currentTrackIndex + 1) % PLAYLIST.length;
            bgAudio.src = PLAYLIST[currentTrackIndex];
            bgAudio.volume = volumeSlider.value / 100;
            bgAudio.play().catch(e => console.log("Audio play prevented:", e));
        }

        bgAudio.addEventListener('ended', playNextTrack);

        function playCurrentTrack() {
            if (musicSelect.value !== 'library' || PLAYLIST.length === 0) return;
            bgAudio.src = PLAYLIST[currentTrackIndex];
            bgAudio.volume = volumeSlider.value / 100;
            bgAudio.play().catch(e => console.log("Audio play prevented:", e));
        }

        function changeMusic() {
            if (musicSelect.value === 'none') {
                bgAudio.pause();
            } else {
                currentTrackIndex = 0;
                if (isRunning) {
                    playCurrentTrack();
                }
            }
        }

        function changeVolume() {
            bgAudio.volume = volumeSlider.value / 100;
        }

        // --- 2. CONTROL BAR AUTO-FADE LOGIC ---
        let fadeTimeout;
        const controlBar = document.getElementById('control-bar');
        const timerBox = document.querySelector('.timer-box');

        function resetFadeTimer() {
            controlBar.classList.remove('opacity-0', 'pointer-events-none');
            timerBox.style.cursor = 'pointer';
            document.body.style.cursor = 'default';
            clearTimeout(fadeTimeout);
            fadeTimeout = setTimeout(() => {
                if (!controlBar.matches(':hover')) {
                    controlBar.classList.add('opacity-0', 'pointer-events-none');
                    document.body.style.cursor = 'none';
                }
            }, 3000);
        }

        document.addEventListener('mousemove', resetFadeTimer);
        document.addEventListener('click', resetFadeTimer);
        document.addEventListener('keypress', resetFadeTimer);
        resetFadeTimer();

        // --- 3. FULLSCREEN LOGIC ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- 4. CANVAS ANIMATION LOGIC ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let currentTheme = 'space';
        let particles = [];
        let biolumTime = 0;
        let seaweedStrands = [];
        let kelpTime = 0;
        let basePairs = [];
        let koiFish = [];
        let lilyPads = [];
        let waterParticles = [];
        let koiTime = 0;
        let quantumTime = 0;

        // Mouse/touch for Glowing Tide theme
        let mouseX = -1000;
        let mouseY = -1000;
        let isMouseMoving = false;
        let mouseTimeout;
        function updateMouse(x, y) {
            mouseX = x;
            mouseY = y;
            isMouseMoving = true;
            clearTimeout(mouseTimeout);
            mouseTimeout = setTimeout(() => { isMouseMoving = false; mouseX = -1000; }, 2000);
        }
        window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => { if (e.touches[0]) updateMouse(e.touches[0].clientX, e.touches[0].clientY); });

        function getFlowAngle(x, y, t) {
            const scale = 0.003;
            return Math.sin(x * scale + t) * Math.cos(y * scale + t * 0.8) * Math.PI * 4;
        }

        class BiolumParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.speed = Math.random() * 1.5 + 0.5;
                const hue = Math.floor((this.x / canvas.width) * 60 + 180);
                this.color = `hsl(${hue}, 100%, 60%)`;
                this.life = Math.random() * 100;
                this.maxLife = 100 + Math.random() * 200;
            }
            update(t) {
                let angle = getFlowAngle(this.x, this.y, t);
                if (isMouseMoving) {
                    const dx = mouseX - this.x, dy = mouseY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 200;
                    if (distance < maxDist) {
                        const angleToMouse = Math.atan2(dy, dx);
                        const influence = 1 - (distance / maxDist);
                        angle = angle * (1 - influence) + (angleToMouse + Math.PI / 2) * influence;
                    }
                }
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                this.life++;
                if (this.life > this.maxLife) { this.reset(); this.life = 0; }
            }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                const size = Math.sin((this.life / this.maxLife) * Math.PI) * 1.5;
                ctx.arc(this.x, this.y, Math.max(0.1, size), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const koiTypes = [
            { base: '#f4f4f4', spots: ['#e74c3c', '#2c3e50'] },
            { base: '#f4f4f4', spots: ['#e74c3c'] },
            { base: '#f39c12', spots: ['#000000', '#ffffff'] },
            { base: '#2c3e50', spots: ['#f1c40f'] },
            { base: '#ffffff', spots: ['#f39c12'] }
        ];

        class Koi {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2;
                this.baseSpeed = 0.5 + Math.random() * 0.8;
                this.speed = this.baseSpeed;
                this.size = 0.8 + Math.random() * 0.5;
                this.type = koiTypes[Math.floor(Math.random() * koiTypes.length)];
                this.spots = [];
                for (let i = 0; i < 3 + Math.random() * 4; i++) {
                    this.spots.push({
                        x: (Math.random() - 0.5) * 30,
                        y: (Math.random() - 0.5) * 10,
                        radius: 4 + Math.random() * 8,
                        color: this.type.spots[Math.floor(Math.random() * this.type.spots.length)]
                    });
                }
                this.turnTarget = this.angle;
                this.swimCycle = Math.random() * 100;
            }
            update() {
                if (Math.random() < 0.02) this.turnTarget += (Math.random() - 0.5) * 1.5;
                const margin = 100;
                const w = canvas.width, h = canvas.height;
                if (this.x < margin) this.turnTarget = 0;
                if (this.x > w - margin) this.turnTarget = Math.PI;
                if (this.y < margin) this.turnTarget = Math.PI / 2;
                if (this.y > h - margin) this.turnTarget = -Math.PI / 2;
                let diff = this.turnTarget - this.angle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                this.angle += diff * 0.02;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.swimCycle += this.speed * 0.1;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.scale(this.size, this.size);
                const wag = Math.sin(this.swimCycle) * 10;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 10;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(5, 12 + wag * 0.1, 8, 4, Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(5, -12 - wag * 0.1, 8, 4, -Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.save();
                ctx.translate(-25, 0);
                ctx.rotate(wag * 0.05);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-15, -8);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, 8);
                ctx.closePath();
                ctx.fillStyle = this.type.base;
                ctx.fill();
                ctx.restore();
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.quadraticCurveTo(15, 12, 0, 12);
                ctx.quadraticCurveTo(-20, 10, -25, 0);
                ctx.quadraticCurveTo(-20, -10, 0, -12);
                ctx.quadraticCurveTo(15, -12, 20, 0);
                ctx.closePath();
                ctx.fillStyle = this.type.base;
                ctx.fill();
                ctx.save();
                ctx.clip();
                this.spots.forEach(spot => {
                    ctx.beginPath();
                    ctx.arc(spot.x, spot.y, spot.radius, 0, Math.PI * 2);
                    ctx.fillStyle = spot.color;
                    ctx.fill();
                });
                ctx.restore();
                ctx.shadowColor = 'transparent';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(-5, 0, 12, 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        function initParticles() {
            particles = [];
            if (currentTheme === 'biolum') {
                const NUM_BIOLUM = 2500;
                for (let i = 0; i < NUM_BIOLUM; i++) particles.push(new BiolumParticle());
                return;
            }
            if (currentTheme === 'kelp') {
                seaweedStrands = [];
                const count = 15;
                for (let i = 0; i < count; i++) {
                    seaweedStrands.push({
                        x: (canvas.width / count) * i + Math.random() * 50,
                        height: canvas.height * 0.4 + Math.random() * canvas.height * 0.3,
                        segments: 10 + Math.floor(Math.random() * 10),
                        offset: Math.random() * Math.PI * 2,
                        color: `hsl(${120 + Math.random() * 40}, 60%, ${20 + Math.random() * 20}%)`,
                        thickness: 8 + Math.random() * 10
                    });
                }
                return;
            }
            if (currentTheme === 'dna') {
                basePairs = [];
                const numPairs = 50;
                const spacing = canvas.height / numPairs;
                for (let i = 0; i < numPairs + 5; i++) {
                    basePairs.push({ y: i * spacing - 50 });
                }
                return;
            }
            if (currentTheme === 'koi') {
                koiFish = [];
                for (let i = 0; i < 12; i++) koiFish.push(new Koi());
                lilyPads = [];
                for (let i = 0; i < 15; i++) {
                    lilyPads.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: 20 + Math.random() * 30,
                        angle: Math.random() * Math.PI * 2,
                        color: `hsl(${100 + Math.random() * 40}, ${40 + Math.random() * 20}%, ${30 + Math.random() * 15}%)`
                    });
                }
                waterParticles = [];
                for (let i = 0; i < 50; i++) {
                    waterParticles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: 1 + Math.random() * 3,
                        speed: 0.1 + Math.random() * 0.2
                    });
                }
                return;
            }
            if (currentTheme === 'magnetic') {
                const numParticles = 150;
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: 0,
                        vy: 0,
                        speed: 1.5 + Math.random() * 2.5,
                        radius: 1 + Math.random() * 1.5,
                        color: Math.random() > 0.5 ? '#ff7b00' : '#ffaa00'
                    });
                }
                return;
            }
            if (currentTheme === 'neural') {
                const numParticles = 80;
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.8,
                        vy: (Math.random() - 0.5) * 0.8,
                        radius: Math.random() * 1.5 + 0.5
                    });
                }
                return;
            }
            if (currentTheme === 'hadron') {
                const NUM_PARTICLES = 60;
                const PARTICLE_RADIUS = 6;
                const SPEED = 3;
                for (let i = 0; i < NUM_PARTICLES; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    particles.push({
                        x: Math.random() * (canvas.width - PARTICLE_RADIUS * 2) + PARTICLE_RADIUS,
                        y: Math.random() * (canvas.height - PARTICLE_RADIUS * 2) + PARTICLE_RADIUS,
                        vx: Math.cos(angle) * SPEED,
                        vy: Math.sin(angle) * SPEED,
                        radius: PARTICLE_RADIUS,
                        color: `hsl(${Math.random() * 360}, 80%, 65%)`
                    });
                }
                return;
            }
            if (currentTheme === 'quantum') {
                const targetParticles = 200;
                const screenArea = canvas.width * canvas.height;
                const areaPerParticle = screenArea / targetParticles;
                const spacing = Math.sqrt(areaPerParticle);
                const cols = Math.floor(canvas.width / spacing);
                const rows = Math.floor(canvas.height / spacing);
                const offsetX = (canvas.width - (cols - 1) * spacing) / 2;
                const offsetY = (canvas.height - (rows - 1) * spacing) / 2;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        const x = offsetX + i * spacing;
                        const y = offsetY + j * spacing;
                        const dx = x - centerX;
                        const dy = y - centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        particles.push({ x: x, y: y, dist: dist });
                    }
                }
                return;
            }
            const particleCount = currentTheme === 'space' ? 150 : (currentTheme === 'ocean' ? 80 : 100);
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * (currentTheme === 'space' ? 1.5 : 3) + 0.5,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random(),
                    pulse: Math.random() * 0.02
                });
            }
        }

        function drawNebula() {
            const time = Date.now() * 0.0005;
            const g1 = ctx.createRadialGradient(
                canvas.width * 0.3 + Math.sin(time) * 100, canvas.height * 0.4 + Math.cos(time) * 100, 0,
                canvas.width * 0.3, canvas.height * 0.4, canvas.width * 0.5
            );
            g1.addColorStop(0, 'rgba(88, 28, 135, 0.4)');
            g1.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const g2 = ctx.createRadialGradient(
                canvas.width * 0.7 + Math.cos(time*0.8) * 150, canvas.height * 0.6 + Math.sin(time*0.8) * 150, 0,
                canvas.width * 0.7, canvas.height * 0.6, canvas.width * 0.6
            );
            g2.addColorStop(0, 'rgba(30, 58, 138, 0.3)');
            g2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g2;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            if (currentTheme === 'space') {
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawNebula();
            } else if (currentTheme === 'ocean') {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#001a33');
                grad.addColorStop(1, '#004080');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentTheme === 'cyber') {
                ctx.fillStyle = 'rgba(0, 10, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentTheme === 'biolum') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(2, 2, 5, 0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'lighter';
            } else if (currentTheme === 'kelp') {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#003366');
                grad.addColorStop(1, '#000d1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                kelpTime += 0.02;
                seaweedStrands.forEach(s => {
                    ctx.beginPath();
                    ctx.moveTo(s.x, canvas.height);
                    for (let i = 0; i <= s.segments; i++) {
                        const y = canvas.height - (s.height / s.segments) * i;
                        const sway = Math.sin(kelpTime + s.offset + (i * 0.3)) * (i * 3);
                        ctx.lineTo(s.x + sway, y);
                    }
                    ctx.lineWidth = s.thickness;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = s.color;
                    ctx.stroke();
                });
                if (Math.random() < 0.1) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: canvas.height + 10,
                        radius: Math.random() * 3 + 1,
                        vx: Math.sin(Math.random()) * 0.5,
                        vy: -Math.random() * 2 - 1,
                        opacity: 0.3 + Math.random() * 0.4
                    });
                }
            } else if (currentTheme === 'dna') {
                ctx.fillStyle = '#0a0f24';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const time = Date.now() * 0.0015;
                const centerX = canvas.width / 2;
                const amplitude = Math.min(canvas.width * 0.25, 180);
                let renderData = [];
                basePairs.forEach(pair => {
                    pair.y += 1.5;
                    if (pair.y > canvas.height + 50) pair.y = -50;
                    const angle = pair.y * 0.015 - time;
                    const xOffset = Math.sin(angle) * amplitude;
                    const zOffset = Math.cos(angle);
                    const x1 = centerX + xOffset;
                    const z1 = zOffset;
                    const x2 = centerX - xOffset;
                    const z2 = -zOffset;
                    renderData.push({ y: pair.y, x1: x1, z1: z1, x2: x2, z2: z2 });
                });
                renderData.forEach(d => {
                    ctx.beginPath();
                    ctx.moveTo(d.x1, d.y);
                    ctx.lineTo(d.x2, d.y);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                });
                let dnaParticles = [];
                renderData.forEach(d => {
                    dnaParticles.push({ x: d.x1, y: d.y, z: d.z1, color: '#ff2a7a' });
                    dnaParticles.push({ x: d.x2, y: d.y, z: d.z2, color: '#b82aff' });
                });
                dnaParticles.sort((a, b) => a.z - b.z);
                dnaParticles.forEach(p => {
                    const scale = (p.z + 2) / 2;
                    const radius = 3.5 * scale;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 15 * scale;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            } else if (currentTheme === 'koi') {
                koiTime += 0.01;
                const w = canvas.width, h = canvas.height;
                const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h));
                grad.addColorStop(0, '#104e5b');
                grad.addColorStop(1, '#05222e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                waterParticles.forEach(p => {
                    p.y -= p.speed;
                    p.x += Math.sin(koiTime + p.y * 0.05) * 0.5;
                    if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                koiFish.forEach(koi => { koi.update(); koi.draw(ctx); });
                lilyPads.forEach(pad => {
                    ctx.save();
                    ctx.translate(pad.x, pad.y);
                    ctx.rotate(pad.angle);
                    ctx.shadowColor = 'rgba(0,0,0,0.4)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 5;
                    ctx.beginPath();
                    ctx.arc(0, 0, pad.radius, 0.2, Math.PI * 2 - 0.2);
                    ctx.lineTo(0, 0);
                    ctx.closePath();
                    ctx.fillStyle = pad.color;
                    ctx.fill();
                    ctx.shadowColor = 'transparent';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.lineWidth = 1.5;
                    for (let i = 1; i < 6; i++) {
                        const angle = (Math.PI * 2 / 6) * i;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * pad.radius * 0.8, Math.sin(angle) * pad.radius * 0.8);
                        ctx.stroke();
                    }
                    ctx.restore();
                });
                ctx.globalCompositeOperation = 'overlay';
                ctx.fillStyle = `rgba(255, 255, 255, ${0.02 + Math.sin(koiTime) * 0.01})`;
                ctx.fillRect(0, 0, w, h);
                ctx.globalCompositeOperation = 'source-over';
            } else if (currentTheme === 'magnetic') {
                ctx.fillStyle = 'rgba(26, 28, 32, 0.12)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentTheme === 'neural') {
                const grad = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, 0,
                    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
                );
                grad.addColorStop(0, '#002a3a');
                grad.addColorStop(1, '#00050a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentTheme === 'hadron') {
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x - p.radius < 0) { p.x = p.radius; p.vx *= -1; }
                    else if (p.x + p.radius > canvas.width) { p.x = canvas.width - p.radius; p.vx *= -1; }
                    if (p.y - p.radius < 0) { p.y = p.radius; p.vy *= -1; }
                    else if (p.y + p.radius > canvas.height) { p.y = canvas.height - p.radius; p.vy *= -1; }
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const p1 = particles[i];
                        const p2 = particles[j];
                        let dx = p2.x - p1.x;
                        let dy = p2.y - p1.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        const minDist = p1.radius + p2.radius;
                        if (distance < minDist) {
                            const safeDist = Math.max(distance, 0.001);
                            const nx = dx / safeDist;
                            const ny = dy / safeDist;
                            const overlap = (minDist - distance) / 2;
                            p1.x -= nx * overlap;
                            p1.y -= ny * overlap;
                            p2.x += nx * overlap;
                            p2.y += ny * overlap;
                            const dvx = p1.vx - p2.vx;
                            const dvy = p1.vy - p2.vy;
                            const dotProduct = dvx * nx + dvy * ny;
                            if (dotProduct > 0) {
                                p1.vx -= dotProduct * nx;
                                p1.vy -= dotProduct * ny;
                                p2.vx += dotProduct * nx;
                                p2.vy += dotProduct * ny;
                            }
                        }
                    }
                }
            } else if (currentTheme === 'quantum') {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                quantumTime = Date.now() * 0.003;
            }

            particles.forEach((p, i) => {
                if (currentTheme === 'space') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    p.opacity += p.pulse;
                    if (p.opacity > 1 || p.opacity < 0.1) p.pulse *= -1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.fill();
                    p.x += p.vx * 0.2;
                    p.y += p.vy * 0.2;
                } else if (currentTheme === 'ocean') {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${p.opacity * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    p.y -= Math.abs(p.vy) + 0.5;
                    p.x += Math.sin(p.y * 0.05) * 0.5;
                } else if (currentTheme === 'cyber') {
                    ctx.fillStyle = '#0f0';
                    ctx.font = '12px monospace';
                    ctx.fillText(Math.random() > 0.5 ? '1' : '0', p.x, p.y);
                    p.y += 3 + Math.abs(p.vy * 5);
                } else if (currentTheme === 'biolum') {
                    p.update(biolumTime);
                    p.draw(ctx);
                } else if (currentTheme === 'kelp') {
                    p.y += p.vy;
                    p.x += Math.sin(kelpTime + p.y * 0.01) * 0.5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.fill();
                } else if (currentTheme === 'magnetic') {
                    const leftPole = { x: canvas.width * 0.3, y: canvas.height * 0.5 };
                    const rightPole = { x: canvas.width * 0.7, y: canvas.height * 0.5 };
                    let dx1 = p.x - leftPole.x, dy1 = p.y - leftPole.y;
                    let d1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                    let dx2 = p.x - rightPole.x, dy2 = p.y - rightPole.y;
                    let d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    d1 = Math.max(d1, 1);
                    d2 = Math.max(d2, 1);
                    let bx = (dx1 / Math.pow(d1, 3)) - (dx2 / Math.pow(d2, 3));
                    let by = (dy1 / Math.pow(d1, 3)) - (dy2 / Math.pow(d2, 3));
                    const bMag = Math.sqrt(bx * bx + by * by);
                    if (bMag > 0) {
                        p.vx = (bx / bMag) * p.speed;
                        p.vy = (by / bMag) * p.speed;
                    }
                    p.x += p.vx;
                    p.y += p.vy;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (d2 < 5 || p.x < -canvas.width || p.x > canvas.width * 2 || p.y < -canvas.height || p.y > canvas.height * 2) {
                        const angle = Math.random() * Math.PI * 2;
                        const r = Math.random() * 8 + 2;
                        p.x = leftPole.x + Math.cos(angle) * r;
                        p.y = leftPole.y + Math.sin(angle) * r;
                    }
                } else if (currentTheme === 'neural') {
                    const connectionDistance = 120;
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < connectionDistance) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            const opacity = 1 - (distance / connectionDistance);
                            ctx.strokeStyle = `rgba(0, 255, 255, ${opacity * 0.7})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#00ffff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (currentTheme === 'hadron') {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (currentTheme === 'quantum') {
                    const wave = Math.sin(p.dist * 0.015 - quantumTime);
                    const radius = 3 + wave * 2.5;
                    const opacity = 0.5 + wave * 0.5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(0.1, radius), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(57, 255, 20, ${opacity})`;
                    ctx.shadowBlur = 15 * opacity;
                    ctx.shadowColor = '#39ff14';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (currentTheme !== 'biolum' && currentTheme !== 'kelp' && currentTheme !== 'dna' && currentTheme !== 'koi' && currentTheme !== 'magnetic' && currentTheme !== 'neural' && currentTheme !== 'hadron' && currentTheme !== 'quantum') {
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                }
            });

            if (currentTheme === 'biolum') biolumTime += 0.005;
            if (currentTheme === 'kelp') particles = particles.filter(p => p.y >= -10);

            animationId = requestAnimationFrame(animate);
        }

        function changeTheme() {
            const select = document.getElementById('theme-select');
            currentTheme = select.value;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentTheme === 'biolum') {
                ctx.fillStyle = '#020205';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            if (currentTheme === 'magnetic') {
                ctx.fillStyle = '#1a1c20';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            initParticles();
        }

        resizeCanvas();
        animate();
    </script>
</body>
